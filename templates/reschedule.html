<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SimpleReschedule</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <!-- Title with tiny superscript checkmark hehe -->
    <div class="title">
        SimpleReschedule<span class="brand-mark">✓</span>
    </div>
    <div class="tagline">Looks simple. Is simple</div>
    <div class="subtagline">Privacy-first. Zero tracking. Zero data stored.</div>


    <div class="form-card">

        <form action="/reschedule_generate" method="POST">

            <label for="language">Choose language:</label>
            <select id="language" name="language" required>
                <option value="" disabled selected>Select language</option>
                <option value="en">EN</option>
                <option value="fi">FI</option>
            </select>

            <label for="recipient">Who is the rescheduling for?</label>
            <select id="recipient" name="recipient" required>
                <option value="" disabled selected>Select recipient</option>
                <option value="hair">Hairdresser / Barber</option>
                <option value="beauty">Lash / Nail Technician</option>
                <option value="massage">Massage / Physio</option>
                <option value="therapy">Therapist</option>
                <option value="doctor">Doctor / Clinic</option>
                <option value="general">General Appointment</option>
            </select>

            <label for="tone" style="margin-top: 24px;">Tone style:</label>
            <select id="tone" name="tone" required>
                <option value="" disabled selected>Select tone</option>
                <option value="simple">Simple & Direct</option>
                <option value="polite">Polite & Warm</option>
                <option value="formal">Formal</option>
            </select>

            <label for="details" style="margin-top: 24px;">Optional details (date, time, etc):</label>
            <textarea id="details" name="details" rows="4" placeholder="(optional)"></textarea>
            <label for="recipient_name" style="margin-top: 24px;">Recipient's name (optional):</label>
            <input type="text" id="recipient_name" name="recipient_name" placeholder="(optional)">
            <label for="your_name" style="margin-top: 12px;">Your name (optional):</label>
            <input type="text" id="your_name" name="your_name" placeholder="(optional)">

            <button type="submit">Generate Rescheduling</button>
        </form>
        <div class="other-tools">Need to cancel instead? 
                        <a href="/">Try SimpleCancel!</a><br>
                        Looking to decline? <a href="/decline">Try SimpleDecline</a><br>
                        Wanting to apologize? <a href="/apology">Try SimpleApology!</a>
        </div>
    </div>

</div>

</body>
</html>
